<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <title>Frontend Mentor | Product preview card component</title>
  <link rel="stylesheet" href="css/style.min.css">
</head>
<body>
  <header class="header">
    <div class="wrapper">
      <h1 class="sr-only">Product preview card component</h1>
    </div>
  </header>

  <main class="main">
    <div class="wrapper">
      <div class="card">
        <div class="image-wrapper">
          <img src="images/image-product-mobile.jpg" alt="Perfume bottle." class="img-mobile" />
          <img src="images/image-product-desktop.jpg" alt="Perfume bottle." class="img-desktop" />
        </div>
        <div class="text-wrapper">
          <div class="category">Perfume</div>
          <h2 class="title">Gabrielle Essence Eau De Parfum</h2>
          <p class="text">
            A floral, solar and voluptuous interpretation composed by Olivier Polge, 
            Perfumer-Creator for the House of CHANEL.
          </p>
          <div class="prices">
            <span class="new-price">$149.99</span>
            <span class="old-price">$169.99</span>
          </div>
          <div class="btn-wrapper">
            <button class="btn"><img src="images/icon-cart.svg" alt="" /> Add to Cart</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="wrapper">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank" class="link">Frontend Mentor<span class="sr-only"> open in a new tab</span></a>. 
      Coded by <a href="https://github.com/usigna" class="link">Usigna</a>.
    </div>
  </footer>
</body>
</html>
